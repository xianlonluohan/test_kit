name: Markdown to PDF on Release

on:
  release:
    types: [published]   # 当 Release 发布时触发（也可用 created）

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository (current repo)
        uses: actions/checkout@v4
        with:
          path: target_repo   # 将当前仓库内容检出到 target_repo 目录

      - name: Checkout script repository
        uses: actions/checkout@v4
        with:
          repository: xianlonluohan/my_markdown_to_pdf
          path: script_repo   # 脚本仓库检出的目录

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown beautifulsoup4 playwright pymdown-extensions
          playwright install chromium   # 安装 playwright 需要的浏览器

      - name: Prepare output directory
        run: mkdir -p ./output

      - name: Get repository name and release tag
        id: vars
        run: |
          # 提取仓库名（去掉所有者部分）
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          # 获取 Release 的 tag 名称
          TAG_NAME="${{ github.event.release.tag_name }}"
          # 组合成压缩包名称
          ZIP_NAME="${REPO_NAME}-${TAG_NAME}"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Run conversion script
        run: |
          python script_repo/test_markdown2_3.py \
            --input target_repo \
            --output ./output \
            --watermark "emakefun" \
            --zip-name "${{ steps.vars.outputs.ZIP_NAME }}"

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.TAG_NAME }}
          files: ./output/${{ steps.vars.outputs.ZIP_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}