name: Markdown to PDF on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: target_repo

      - name: Checkout script repository
        uses: actions/checkout@v4
        with:
          repository: xianlonluohan/my_markdown_to_pdf
          path: script_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown beautifulsoup4 playwright pymdown-extensions python-markdown-math markdown-checklist
          playwright install chromium

      - name: Install Sarasa Fixed SC font
        run: |
          # 下载 Sarasa 字体包（包含 Sarasa Fixed SC）
          wget https://github.com/be5invis/Sarasa-Gothic/releases/download/v1.0.20/Sarasa-TTF-1.0.20.7z
          sudo apt-get install -y p7zip-full
          7z x Sarasa-TTF-1.0.20.7z -o./sarasa
          # 安装所有 Sarasa 字体（或只安装 SarasaFixedSC-*）
          sudo mkdir -p /usr/share/fonts/truetype/sarasa
          sudo cp ./sarasa/SarasaFixedSC-*.ttf /usr/share/fonts/truetype/sarasa/
          # 刷新字体缓存
          sudo fc-cache -fv
          # 验证字体是否安装成功
          fc-list | grep "Sarasa Fixed SC"

      - name: Prepare output directory
        run: mkdir -p ./output

      - name: Get repository name and release tag
        id: vars
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          TAG_NAME="${{ github.event.release.tag_name }}"
          ZIP_NAME="${REPO_NAME}-${TAG_NAME}"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Run conversion script
        run: |
          python script_repo/test_markdown2_3.py \
            --input target_repo \
            --output ./output \
            --watermark "emakefun" \
            --zip-name "${{ steps.vars.outputs.ZIP_NAME }}"

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.TAG_NAME }}
          files: ./output/${{ steps.vars.outputs.ZIP_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}