name: Markdown to PDF on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository (the one being released)
        uses: actions/checkout@v4
        with:
          path: target_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install emakefun_markdown_to_pdf tool
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/xianlonluohan/my_markdown_to_pdf.git

      - name: Install Playwright browser (required)
        run: |
          playwright install chromium

      - name: Install Sarasa Fixed SC font 
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
          wget https://github.com/be5invis/Sarasa-Gothic/releases/download/v1.0.37/SarasaFixedSC-TTF-Unhinted-1.0.37.7z
          7z x SarasaFixedSC-TTF-Unhinted-1.0.37.7z -o./sarasa
          mkdir -p ~/.local/share/fonts/sarasa
          cp ./sarasa/SarasaFixedSC-*.ttf ~/.local/share/fonts/sarasa/
          fc-cache -fv

      - name: Prepare output directory
        run: mkdir -p ./output

      - name: Get repository name and release tag
        id: vars
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TAG_NAME="${{ github.event.release.tag_name }}"
          ZIP_NAME="${REPO_NAME}-${TAG_NAME}"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Run conversion using installed command
        run: |
          emakefun_markdown_to_pdf \
            --input target_repo \
            --output ./output \
            --watermark "emakefun" \
            --zip-name "${{ steps.vars.outputs.ZIP_NAME }}"

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.TAG_NAME }}
          files: ./output/${{ steps.vars.outputs.ZIP_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}